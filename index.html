<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kafatemor Perfumes</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#0f0f0f;
color:white;
}

/* NAVBAR */

header{
position:fixed;
top:0;
width:100%;
background:black;
padding:15px 30px;
display:flex;
justify-content:space-between;
align-items:center;
z-index:1000;
}

header a{
color:white;
text-decoration:none;
margin-left:20px;
}

header a:hover{
color:#d4af37;
}

.container{
max-width:1200px;
margin:auto;
padding:80px 20px;
}

.gold{
color:#d4af37;
}

/* HERO */

.hero{
height:90vh;
background:url("kafatemor.jpg") center/cover;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
}

.hero-content{
background:rgba(0,0,0,0.6);
padding:40px;
border-radius:10px;
}

.hero h1{
font-size:40px;
}

.btn{
display:inline-block;
padding:10px 20px;
border-radius:25px;
margin:5px;
text-decoration:none;
cursor:pointer;
}

.btn-primary{
background:#d4af37;
color:black;
border:none;
}

.btn-secondary{
border:1px solid white;
color:white;
}

/* BUSCADOR */

.search{
margin-bottom:40px;
text-align:center;
}

.search input{
padding:12px;
width:320px;
border-radius:30px;
border:none;
outline:none;
}

/* PERFUMES */

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:30px;
}

.card{
background:#1c1c1c;
border-radius:10px;
overflow:hidden;
text-align:center;
transition:0.3s;
}

.card:hover{
transform:translateY(-8px);
}

.card img{
width:100%;
height:220px;
object-fit:cover;
}

.card-body{
padding:20px;
}

.price{
color:#d4af37;
margin:10px 0;
}

/* CARRITO */

.cart{
position:fixed;
right:20px;
bottom:90px;
background:#1c1c1c;
padding:20px;
border-radius:10px;
width:260px;
}

.item{
display:flex;
justify-content:space-between;
font-size:14px;
margin-bottom:6px;
}

.remove{
color:red;
cursor:pointer;
}

/* WHATSAPP */

.whatsapp{
position:fixed;
right:20px;
bottom:20px;
background:#25D366;
color:white;
padding:15px;
border-radius:50%;
font-size:22px;
text-decoration:none;
}

/* MOBILE */

@media(max-width:900px){

.grid{
grid-template-columns:repeat(2,1fr);
}

}

</style>

</head>

<body>

<header>
<div class="gold"><b>Kafatemor</b></div>
<div>
<a href="#">Inicio</a>
<a href="#perfumes">Perfumes</a>
</div>
</header>

<section class="hero">

<div class="hero-content">

<h1>Descubrí tu próxima <span class="gold">fragancia favorita</span></h1>

<p>Perfumes originales con envíos a todo Uruguay</p>

<a href="#perfumes" class="btn btn-primary">Ver perfumes</a>

</div>

</section>

<section id="perfumes" class="container">

<h2>Catálogo de perfumes</h2>

<div class="search">

<input type="text" id="searchInput" placeholder="Buscar perfume...">

</div>

<div class="grid" id="perfumeGrid"></div>

</section>

<div class="cart">

<h3>Carrito</h3>

<div id="cartItems"></div>

<p>Total: $<span id="total">0</span></p>

<button class="btn btn-primary" onclick="sendWhatsApp()">
Enviar pedido
</button>

</div>

<a class="whatsapp" href="https://wa.me/59892436816">💬</a>

<script>

const perfumes = [

"Aqua di Gioia EDP.jpg",
"Asad Zanzibar.webp",
"Ajayes Portrait.webp",
"Calvin Klein One 200 ml.webp",
"9 AM Afnan.avif",
"Azzure Oud French Avenue.webp",
"Coco Mademoiselle Chanel.webp",
"Collection Dantiqués 1910 Lattafa.webp",
"Al Haramain Amber Oud White.webp",
"212 VIP Men Are You on The List.jpg",
"Aqua di Gio PARFUM 50ml.webp",
"9 AM Dive.webp",
"Club de Nuit Preciux 1.webp",
"Delights Island Breeze Armaf 100 ml.webp",
"Divine Elixir Women JPG.webp",
"Al Absar Mudiyah Edp 100 Ml.webp",
"Bharara Bleu 100 ml EDP.webp",
"Cotton Bliss Risala.webp",
"Al Haramain Amber Musk.jpg",
"Byzance Rochas 100 ml.jpg",
"Amor Amor Cacharel.jpg",
"Aether Extrait French Avenue.webp",
"Club de Nuit Imperiale 105 ml.webp",
"Aqua di Gio Profondo 100ml EDP.webp",
"212 Vip Rosé NYC 80ml CH.jpg",
"Burj Noir Risala.webp",
"Club de Nuit Sillage 105 ml.webp",
"Bharara Niche Femme 100ml EDP.webp",
"Bharara Don 100 ml EDP.webp",
"Club de Nuit Bling.webp",
"Asad Negro 100 ml EDP.webp",
"Club De Nuit Lionheart Woman.webp",
"Bad Femme Maison Alhambra.webp",
"212 NYC 200 ml EDT.jpg",
"Club de Nuit Untold.webp",
"Al Layl Al Wataniah.webp",
"212 Men NYC 100ml EDT.webp",
"Calvin Klein Eternity.webp",
"Bad Boy Le Parfum 50 ml.webp",
"Amethyst Badee Al Oud.jpg",
"Al Wataniah Durrat Al Aroos Edp 85ml.webp",
"Burj Blanc Risala.webp",
"Coach Gold New York.jpg",
"Al Noble Wazeer 100 ml EDP.webp",
"9 PM Elixir.webp",
"Bharara Double Bleu 100 ml EDP.webp",
"Asad Bourbon 100 ml.webp",
"Armani Code Parfum 125ml.webp",
"Bleu de Chanel EDP 150 ml.webp",
"Burberry Goddess 100 ml EDP.webp"

];

const grid = document.getElementById("perfumeGrid");

function loadPerfumes(list){

grid.innerHTML="";

list.forEach(file=>{

let name=file
.replace(".jpg","")
.replace(".webp","")
.replace(".avif","");

grid.innerHTML+=`

<div class="card">

<img src="images/${file}">

<div class="card-body">

<h3>${name}</h3>

<p class="price">$1990</p>

<button class="btn btn-primary" onclick="addToCart('${name}',1990)">
Agregar
</button>

<a href="https://wa.me/59892436816?text=Hola quiero comprar ${name}" class="btn btn-secondary">
Comprar
</a>

</div>

</div>

`;

});

}

loadPerfumes(perfumes);

/* BUSCADOR */

document.getElementById("searchInput").addEventListener("keyup",function(){

let search=this.value.toLowerCase();

let filtered=perfumes.filter(p=>p.toLowerCase().includes(search));

loadPerfumes(filtered);

});

/* CARRITO */

let cart=[];

function addToCart(name,price){

cart.push({name,price});

updateCart();

}

function removeFromCart(index){

cart.splice(index,1);

updateCart();

}

function updateCart(){

let cartItems=document.getElementById("cartItems");

cartItems.innerHTML="";

let total=0;

cart.forEach((item,i)=>{

total+=item.price;

cartItems.innerHTML+=`

<div class="item">

${item.name} $${item.price}

<span class="remove" onclick="removeFromCart(${i})">❌</span>

</div>

`;

});

document.getElementById("total").innerText=total;

}

function sendWhatsApp(){

if(cart.length===0){

alert("Tu carrito está vacío");

return;

}

let msg="Hola quiero pedir:%0A";

let total=0;

cart.forEach(item=>{

msg+=`- ${item.name} $${item.price}%0A`;

total+=item.price;

});

msg+=`%0ATotal: $${total}`;

window.open("https://wa.me/59892436816?text="+msg);

}

</script>

</body>
</html>
