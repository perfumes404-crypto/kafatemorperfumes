<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kafatemor Perfumes</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
font-family:Poppins;
margin:0;
background:#f7f7f7;
}

header{
background:black;
color:white;
text-align:center;
padding:20px;
}

h1{
margin:0;
}

.catalogo{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
padding:30px;
max-width:1000px;
margin:auto;
}

.producto{
background:white;
border-radius:10px;
padding:15px;
text-align:center;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.producto img{
width:100%;
height:180px;
object-fit:contain;
}

.precio{
font-weight:bold;
margin:10px 0;
}

.boton{
background:black;
color:white;
padding:10px 15px;
border:none;
border-radius:8px;
cursor:pointer;
transition:0.3s;
}

.boton:hover{
background:#444;
}

.carrito{
position:fixed;
right:20px;
bottom:20px;
background:white;
padding:20px;
border-radius:10px;
width:260px;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
}

.carrito h3{
margin-top:0;
}

.item{
display:flex;
justify-content:space-between;
margin-bottom:8px;
}

.eliminar{
color:red;
cursor:pointer;
}

.total{
font-weight:bold;
margin-top:10px;
}

.whatsapp{
background:#25D366;
width:100%;
margin-top:10px;
}

@media(max-width:800px){

.catalogo{
grid-template-columns:repeat(2,1fr);
}

}

</style>
</head>

<body>

<header>
<h1>Kafatemor Perfumes</h1>
<p>Perfumes árabes originales</p>
</header>

<section class="catalogo">

<div class="producto">
<img src="https://lattafa.com/cdn/shop/products/Honor_And_Glory.png">
<h3>Honor & Glory</h3>
<p class="precio">$1990</p>
<button class="boton" onclick="agregar('Honor & Glory',1990)">Agregar al carrito</button>
</div>

<div class="producto">
<img src="https://lattafa.com/cdn/shop/products/Khamrah.png">
<h3>Khamrah</h3>
<p class="precio">$1990</p>
<button class="boton" onclick="agregar('Khamrah',1990)">Agregar al carrito</button>
</div>

<div class="producto">
<img src="https://lattafa.com/cdn/shop/products/Mandarin_Sky.png">
<h3>Mandarin Sky</h3>
<p class="precio">$1990</p>
<button class="boton" onclick="agregar('Mandarin Sky',1990)">Agregar al carrito</button>
</div>

<div class="producto">
<img src="https://lattafa.com/cdn/shop/products/Fakhar_Black.png">
<h3>Fakhar Black</h3>
<p class="precio">$1990</p>
<button class="boton" onclick="agregar('Fakhar Black',1990)">Agregar al carrito</button>
</div>

</section>

<div class="carrito">

<h3>🛒 Carrito</h3>

<div id="lista"></div>

<p class="total">
Total: $<span id="total">0</span>
</p>

<button class="boton whatsapp" onclick="enviarWhatsapp()">
Enviar pedido por WhatsApp
</button>

</div>

<script>

let carrito = []

function agregar(nombre,precio){

carrito.push({nombre,precio})

render()

}

function eliminar(index){

carrito.splice(index,1)

render()

}

function render(){

let lista = document.getElementById("lista")

lista.innerHTML=""

let total=0

carrito.forEach((item,i)=>{

total+=item.precio

lista.innerHTML+=`

<div class="item">

<span>${item.nombre}</span>

<span>

$${item.precio}

<span class="eliminar" onclick="eliminar(${i})">❌</span>

</span>

</div>

`

})

document.getElementById("total").innerText=total

}

function enviarWhatsapp(){

if(carrito.length==0){

alert("Tu carrito está vacío")

return

}

let mensaje="Hola! Quiero pedir:%0A"

carrito.forEach(item=>{

mensaje+=- ${item.nombre} $${item.precio}%0A

})

let total=carrito.reduce((a,b)=>a+b.precio,0)

mensaje+=%0ATotal: $${total}

window.open(https://wa.me/59892436816?text=${mensaje})

}

</script>

</body>
</html>
